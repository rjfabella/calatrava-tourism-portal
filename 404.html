<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

}
body{font-family:var(--fb);background:var(--deep);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center;overflow:hidden}
.wrap{position:relative;z-index:1;max-width:560px}
.code{font-family:var(--fd);font-size:clamp(6rem,18vw,11rem);font-weight:300;line-height:1;color:rgba(255,255,255,.12)}

p{font-size:16.8px;line-height:1.8;color:rgba(255,255,255,.78);margin-bottom:2.25rem}
.actions{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}
.actions a{font-size:12.9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;padding:.85rem 1.7rem;border-radius:3px;transition:background .3s,color .3s,border-color .3s}
.btn-solid{background:var(--gold);color:var(--white)}
.btn-solid:hover{background:#a07a3a}
.btn-line{color:var(--gl);border:1px solid rgba(212,168,106,.4)}
.btn-line:hover{background:var(--gold);color:var(--white);border-color:var(--gold)}
a:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
/* drifting waves backdrop */
.waves{position:fixed;left:0;right:0;bottom:-2px;opacity:.35;pointer-events:none}
@media(prefers-reduced-motion:reduce){*{animation:none!important}}
